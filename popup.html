<!DOCTYPE html>
<html>
<head>
  <title>Phishing Detector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      min-width: 250px;
      padding: 15px;
    }
    h3 {
      margin-top: 0;
    }
    button {
      padding: 8px 10px;
      margin: 5px;
      font-weight: bold;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }
    .report {
      background: #e74c3c;
      color: white;
    }
    .safe {
      background: #3498db;
      color: white;
    }
  </style>
</head>
<body>
  <h3>Phishing Detector</h3>
  <p>This extension warns you if the current site might be phishing.</p>
  <button id="report-phishing" class="report">Report as Phishing</button>
  <button id="report-safe" class="safe">Report as Safe</button>

  <script src="popup.js"></script>
</body>
</html>
